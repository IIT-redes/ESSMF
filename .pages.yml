media:
  - name: images
    label: Website images
    input: site_src/assets
    output: /assets
    extensions: [png, jpg, jpeg, webp, svg]
    rename: safe
  - name: documents
    label: Library documents
    input: site_src/docs/materials
    output: /docs/materials
    categories: [document]
    rename: safe

settings:
  content:
    merge: true
  commit:
    identity: user
    templates:
      create: "content: create {path}"
      update: "content: update {path}"
      delete: "content: delete {path}"
      rename: "content: rename {oldPath} to {newPath}"

actions:
  - name: validate-site
    label: Validate website content
    workflow: validate-content.yml
    ref: current

components:
  editorial_status:
    type: select
    label: Editorial status
    options:
      values:
        - { name: draft, label: Draft }
        - { name: review, label: Ready for review }
        - { name: approved, label: Approved }
  intro_section:
    type: object
    fields:
      - { name: eyebrow, label: Small heading, type: string }
      - { name: title, label: Main heading, type: string }
      - { name: text, label: Explanation, type: text }

content:
  - name: homepage
    label: Homepage
    type: file
    path: content/home.yml
    format: yaml
    fields:
      - { name: editorial_status, component: editorial_status }
      - name: hero
        label: Hero area
        type: object
        fields:
          - { name: eyebrow, type: string }
          - { name: title, type: string }
          - { name: philosophy, type: text }
          - { name: lead, type: text }
          - { name: invitation, type: text }
          - { name: primary_button, type: string }
          - { name: secondary_button, type: string }
      - { name: road_intro, label: Decision road introduction, component: intro_section }
      - name: road_turns
        label: Decision road turning points
        type: object
        list: true
        fields:
          - { name: number, type: string }
          - { name: kicker, type: string }
          - { name: title, type: string }
          - { name: text, type: text }
          - { name: href, type: string }
          - { name: selected, type: boolean }
      - { name: focus_intro, label: Why these three mechanisms, component: intro_section }
      - name: focus_cards
        label: Three selected mechanisms
        type: object
        list: true
        fields:
          - { name: badge, type: string }
          - { name: title, type: string }
          - { name: text, type: text }
      - name: interaction_callout
        type: object
        fields:
          - { name: title, type: string }
          - { name: text, type: text }
      - { name: mechanisms_intro, label: Review environments introduction, component: intro_section }
      - name: mechanism_cards
        label: Mechanism cards
        type: object
        list: true
        fields:
          - { name: href, type: string }
          - { name: image, type: image, options: { media: images } }
          - { name: badge, type: string }
          - { name: title, type: string }
          - { name: summary, type: text }
          - { name: dimensions, type: string, list: true }
          - { name: link_label, type: string }
      - name: expert_invitation
        label: Expert invitation
        type: object
        fields:
          - { name: eyebrow, type: string }
          - { name: title, type: string }
          - { name: text, type: text }
          - { name: steps, type: string, list: true }
          - { name: button, type: string }

  - name: mechanisms_workspace
    label: Mechanisms and all review pages
    type: group
    items:
      - name: tariff_workspace
        label: Tariff design
        type: group
        items:
          - name: tariff_overview
            label: 00 — Mechanism overview page
            type: file
            path: content/mechanisms/tariff.yml
            format: yaml
            fields: &mechanism_fields
              - { name: editorial_status, component: editorial_status }
              - name: hero
                type: object
                fields:
                  - { name: eyebrow, type: string }
                  - { name: title, type: string }
                  - { name: philosophy, type: text }
                  - { name: lead, type: text }
                  - { name: primary_button, type: string }
                  - { name: secondary_button, type: string }
              - name: sections
                type: object
                fields:
                  - { name: overview, component: intro_section }
                  - { name: idea, component: intro_section }
                  - { name: why, component: intro_section }
                  - name: who
                    type: object
                    fields:
                      - { name: eyebrow, type: string }
                      - { name: title, type: string }
                      - { name: text, type: text }
                      - { name: where_title, type: string }
                      - { name: where_text, type: text }
                  - { name: framework, component: intro_section }
              - name: dimensions
                type: object
                list: true
                fields:
                  - { name: id, type: string, readonly: true }
                  - { name: href, type: string, readonly: true }
                  - { name: number, type: string }
                  - { name: title, type: string }
                  - { name: summary, type: text }
                  - { name: link_label, type: string }
              - name: visual_cards
                label: Visual cards
                type: object
                list: true
                fields:
                  - { name: image, type: image, options: { media: images } }
                  - { name: title, type: string }
                  - { name: text, type: text }
              - { name: feedback, component: intro_section }
              - { name: challenge_intro, component: intro_section }
              - name: challenges
                type: object
                list: true
                fields:
                  - { name: id, type: string, readonly: true }
                  - { name: title, type: string }
                  - { name: question, type: text }
                  - { name: prompts, type: string, list: true }
              - { name: final_feedback, component: intro_section }
          - name: tariff_dimensions
            label: Review-dimension pages
            type: group
            items:
              - name: tariff_cost_driver
                label: 01 — Network cost driver
                type: file
                path: content/dimensions/tariff-network-cost-driver.yml
                format: yaml
                fields: &dimension_fields
                  - { name: editorial_status, component: editorial_status }
                  - { name: slug, type: string, readonly: true }
                  - { name: file, type: string, readonly: true }
                  - { name: mechanism, type: string, readonly: true }
                  - { name: feedback_key, type: string, readonly: true }
                  - { name: hero_image, type: image, options: { media: images } }
                  - { name: eyebrow, type: string }
                  - { name: title, type: string }
                  - { name: subtitle, type: text }
                  - { name: definition_title, type: string }
                  - { name: definition_paragraphs, type: text, list: true }
                  - name: choices
                    type: object
                    list: true
                    fields:
                      - { name: title, type: string }
                      - { name: text, type: text }
                  - { name: example_title, type: string }
                  - { name: example_text, type: text }
                  - { name: review_principle, type: text }
                  - name: stakeholders
                    type: object
                    list: true
                    fields:
                      - { name: name, type: string }
                      - { name: text, type: text }
                  - { name: questions, type: text, list: true }
                  - { name: evidence, type: text, list: true }
                  - { name: feedback_eyebrow, type: string }
                  - { name: feedback_title, type: string }
                  - { name: feedback_text, type: text }
              - { name: tariff_resolution, label: "02 — Temporal and locational resolution", type: file, path: content/dimensions/tariff-temporal-locational-resolution.yml, format: yaml, fields: *dimension_fields }
              - { name: tariff_response, label: "03 — Response capability", type: file, path: content/dimensions/tariff-response-capability.yml, format: yaml, fields: *dimension_fields }
              - { name: tariff_fairness, label: "04 — Fairness and protection", type: file, path: content/dimensions/tariff-fairness-protection.yml, format: yaml, fields: *dimension_fields }
              - { name: tariff_coordination, label: "05 — Coordination with other signals", type: file, path: content/dimensions/tariff-coordination-signals.yml, format: yaml, fields: *dimension_fields }
              - { name: tariff_evidence, label: "06 — Evidence and performance", type: file, path: content/dimensions/tariff-evidence-performance.yml, format: yaml, fields: *dimension_fields }

      - name: connection_workspace
        label: Flexibility connection agreement
        type: group
        items:
          - name: connection_overview
            label: 00 — Mechanism overview page
            type: file
            path: content/mechanisms/connection.yml
            format: yaml
            fields: *mechanism_fields
          - name: connection_dimensions
            label: Review-dimension pages
            type: group
            items:
              - { name: connection_access, label: "01 — Access-right design", type: file, path: content/dimensions/connection-access-right-design.yml, format: yaml, fields: *dimension_fields }
              - { name: connection_curtailment, label: "02 — Curtailment and compensation", type: file, path: content/dimensions/connection-curtailment-compensation.yml, format: yaml, fields: *dimension_fields }
              - { name: connection_operation, label: "03 — Operational interface", type: file, path: content/dimensions/connection-operational-interface.yml, format: yaml, fields: *dimension_fields }
              - { name: connection_protection, label: "04 — User protection and safeguards", type: file, path: content/dimensions/connection-user-protection.yml, format: yaml, fields: *dimension_fields }
              - { name: connection_evolution, label: "05 — Contract evolution", type: file, path: content/dimensions/connection-contract-evolution.yml, format: yaml, fields: *dimension_fields }
              - { name: connection_market, label: "06 — Market participation and interaction", type: file, path: content/dimensions/connection-market-participation.yml, format: yaml, fields: *dimension_fields }

      - name: tmf_workspace
        label: Electricity System Services Market
        type: group
        items:
          - name: tmf_overview
            label: 00 — Framework overview page
            type: file
            path: content/mechanisms/tmf.yml
            format: yaml
            fields:
              - { name: editorial_status, component: editorial_status }
              - name: hero
                type: object
                fields:
                  - { name: title, type: string }
                  - { name: statement, type: text }
                  - { name: lead, type: text }
                  - { name: primary_button, type: string }
                  - { name: secondary_button, type: string }
              - name: sections
                type: object
                fields:
                  - { name: journey, component: intro_section }
                  - { name: idea, component: intro_section }
                  - { name: why, component: intro_section }
                  - { name: affected, component: intro_section }
                  - { name: where, component: intro_section }
                  - { name: framework-view, component: intro_section }
                  - { name: review, component: intro_section }
                  - { name: final-feedback, component: intro_section }
              - name: pillars
                type: object
                list: true
                fields:
                  - { name: id, type: string, readonly: true }
                  - { name: eyebrow, type: string }
                  - { name: title, type: string }
                  - { name: summary, type: text }
          - name: tmf_pillars
            label: Pillar detail pages
            type: group
            items:
              - name: pillar_architecture
                label: 01 — Market architecture
                type: file
                path: content/pillars/market-architecture.yml
                format: yaml
                fields: &pillar_fields
                  - { name: editorial_status, component: editorial_status }
                  - { name: slug, type: string, readonly: true }
                  - { name: file, type: string, readonly: true }
                  - { name: eyebrow, type: string }
                  - { name: title, type: string }
                  - { name: subtitle, type: text }
                  - name: cards
                    type: object
                    list: true
                    fields:
                      - { name: title, type: string }
                      - { name: text, type: text }
                      - { name: items, type: text, list: true }
              - { name: pillar_coordination, label: "02 — Sub-market coordination", type: file, path: content/pillars/sub-market-coordination.yml, format: yaml, fields: *pillar_fields }
              - { name: pillar_optimization, label: "03 — Market optimization", type: file, path: content/pillars/market-optimization.yml, format: yaml, fields: *pillar_fields }
              - { name: pillar_operation, label: "04 — Market operation", type: file, path: content/pillars/market-operation.yml, format: yaml, fields: *pillar_fields }
              - { name: pillar_network, label: "05 — Network representation", type: file, path: content/pillars/network-representation.yml, format: yaml, fields: *pillar_fields }

  - name: supporting_pages
    label: Supporting pages
    type: group
    items:
      - name: team
        label: Who we are
        type: file
        path: content/team.yml
        format: yaml
        fields:
          - { name: editorial_status, component: editorial_status }
          - { name: eyebrow, type: string }
          - { name: title, type: string }
          - { name: intro, type: text }
          - { name: team_image, type: image, options: { media: images } }
          - name: members
            type: object
            list: true
            fields:
              - { name: initials, type: string }
              - { name: name, type: string }
              - { name: role, type: string }
              - { name: program, type: string }
              - { name: bio, type: text }
              - { name: email, type: string }
      - name: work
        label: Our work
        type: file
        path: content/work.yml
        format: yaml
        fields:
          - { name: editorial_status, component: editorial_status }
          - { name: eyebrow, type: string }
          - { name: title, type: string }
          - { name: intro, type: text }
      - name: library
        label: Library
        type: file
        path: content/library.yml
        format: yaml
        fields:
          - { name: editorial_status, component: editorial_status }
          - { name: intro, component: intro_section }
          - name: items
            label: Documents
            type: object
            list: true
            fields:
              - { name: title, type: string }
              - { name: description, type: text }
              - { name: file, type: file, options: { media: documents } }
              - { name: link_label, type: string }

  - name: feedback
    label: Forms and giscus settings
    type: file
    path: content/feedback.yml
    format: yaml
    fields:
      - name: general
        type: object
        fields:
          - { name: github_hub_url, type: string }
          - { name: poll_url, type: string }
          - { name: upload_url, type: string }
          - { name: general_feedback_url, type: string }
      - name: giscus
        type: object
        fields:
          - { name: enabled, type: boolean }
          - { name: repo, type: string }
          - { name: repo_id, type: string }
          - { name: category, type: string }
          - { name: category_id, type: string }
          - { name: theme, type: string }
          - { name: lang, type: string }
      - name: mechanisms
        type: object
        list: true
        fields: &feedback_fields
          - { name: key, type: string, readonly: true }
          - { name: label, type: string }
          - { name: form_url, type: string }
          - { name: giscus_term, type: string }
          - { name: giscus_category, type: string }
          - { name: giscus_category_id, type: string }
      - name: tmf_sections
        type: object
        list: true
        fields: *feedback_fields
      - name: dimension_pages
        type: object
        list: true
        fields: *feedback_fields
