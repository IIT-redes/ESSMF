challenge_intro:
  eyebrow: Interactive stakeholder challenge
  title: Test the agreement from four perspectives
  text: Open each card to expose the unresolved questions that should drive expert feedback.
challenges:
- id: challenge-dso
  title: DSO lens
  question: When does non-firm access create more system value than reinforcement or explicit procurement?
  prompts:
  - How is the constrained capacity calculated?
  - Can the DSO forecast and control curtailment reliably?
  - What triggers conversion to firm access?
- id: challenge-regulator
  title: Regulatory lens
  question: How can alternative access remain voluntary, transparent, and non-discriminatory?
  prompts:
  - Should standard contract templates be mandatory?
  - How are curtailment limits audited?
  - Which risks may legally be transferred to the user?
- id: challenge-developer
  title: Developer and aggregator lens
  question: Can developers finance and operate projects under uncertain access?
  prompts:
  - Is curtailment predictable enough for investment?
  - Can flexibility obligations be aggregated or traded?
  - Does the contract prevent participation in local markets?
- id: challenge-customer
  title: Customer and FSP lens
  question: Does the agreement offer a genuine choice and understandable risk?
  prompts:
  - Is compensation proportionate to access limitations?
  - Are notification and control arrangements practical?
  - What remedy exists if curtailment exceeds the agreed envelope?
final_feedback:
  eyebrow: Final contribution
  title: General comments and supporting material
  text: Share contract examples, regulatory decisions, operational data, or connection-case evidence.
