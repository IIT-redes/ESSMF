visual_cards:
- title: The customer interface
  text: Bills and charging structures translate network design into a customer-facing signal.
  image: ../assets/tariff-t2.webp
- title: A changing resource base
  text: Renewables, electrification, storage, and EV adoption alter when and where network costs arise.
  image: ../assets/tariff-t3.webp
- title: Network context
  text: The same tariff can produce different value depending on local topology, hosting capacity, and flexibility potential.
  image: ../assets/tariff-t4.webp
- title: Distributional outcomes
  text: Tariff alternatives can produce very different cost outcomes across customers and EV-adoption scenarios.
  image: ../assets/tariff-t5.webp
- title: Behavioural response
  text: The same underlying demand can respond differently depending on incentives, automation, and constraints.
  image: ../assets/tariff-t6.webp
