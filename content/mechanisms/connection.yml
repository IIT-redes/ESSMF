editorial_status: approved
key: connection
file: flexibility-connection-agreement.html
hero:
  eyebrow: Conditional access under constrained network capacity
  title: Flexibility connection agreement
  philosophy: A connection is more than permission to use the grid; it is an agreement about how scarce capacity, risk, and
    responsibility are shared.
  lead: Flexible or alternative connection agreements offer access under defined operational limitations when fully firm capacity
    is not immediately available or is not the most efficient solution. The mechanism can accelerate electrification and renewable
    integration, but only if the access right, curtailment envelope, compensation, control, review, and path to firm access
    are transparent. We respectfully invite your expert guidance to make flexible access efficient, voluntary, bankable, non-discriminatory,
    and operationally credible.
  primary_button: Understand the agreement
  secondary_button: Challenge the proposal
sections:
  overview:
    eyebrow: Overview and orientation
    title: Connection flexibility changes the definition of network access
    text: A flexibility connection agreement is the access-right branch of the portfolio. It uses the flexibility of a connection
      applicant or existing user to fit additional demand, generation, or storage within a constrained network envelope.
  idea:
    eyebrow: Our proposal
    title: Review the agreement as a complete allocation of rights, control, and risk
    text: ''
  why:
    eyebrow: Why it matters
    title: The mechanism can unlock capacity quickly, but its hidden costs may emerge later
    text: "Poorly designed agreements can expose users to unbankable curtailment, discriminate between connection\n      \
      \  applicants, weaken local-market liquidity, or postpone necessary reinforcement without accountability."
  who:
    eyebrow: Who is affected?
    title: A contract with system-wide consequences
    text: ''
    where_title: Queues, reinforcement delays, and constrained hosting capacity
    where_text: The mechanism is most relevant when a useful connection can be offered before full reinforcement, and when
      the constraint can be monitored, forecast, and managed transparently.
  framework:
    eyebrow: Shared review structure
    title: Review dimensions
    text: Each dimension below is a separate review environment. Open a card to read the full explanation and leave focused
      comments on that exact design dimension.
