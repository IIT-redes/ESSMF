hero:
  eyebrow: Implicit flexibility through network-use price signals
  title: Tariff design mechanism
  philosophy: A network tariff is more than a bill; it is the grid's quiet instruction about when, where, and how capacity
    should be used.
  lead: Network tariffs primarily recover network costs, but their structure can also influence the timing, location, and
    magnitude of withdrawals and injections. Because this flexibility is implicit rather than contracted, the design must
    connect a real network cost driver to a response that customers can understand and deliver. We respectfully invite your
    expert guidance to make tariff design more effective, fair, evidence-based, and compatible with explicit flexibility procurement.
  primary_button: Understand the mechanism
  secondary_button: Challenge the proposal
sections:
  overview:
    eyebrow: Overview and orientation
    title: Tariffs acquire flexibility indirectly
    text: Tariff design is the implicit branch of the flexibility-acquisition portfolio. It does not buy a specific activation;
      instead, it changes the economic conditions under which many users make ordinary consumption, charging, storage, and
      injection decisions.
  idea:
    eyebrow: Our proposal
    title: Evaluate the tariff as a chain from network need to customer response
    text: ''
  why:
    eyebrow: Why it matters
    title: A poorly coordinated tariff can solve one problem and create another
    text: "A tariff may reduce a peak, shift it to another hour, distort a local-market baseline, or place risk\n        on\
      \ users who cannot respond. Effectiveness therefore has to be tested against physical, behavioural,\n        regulatory,\
      \ and distributional outcomes."
  who:
    eyebrow: Who is affected?
    title: A multi-actor design
    text: ''
    where_title: Recurring, measurable network patterns
    where_text: Tariffs are strongest where network stress has recurring temporal, capacity, or locational drivers and where
      customers have enough information and controllability to respond.
  framework:
    eyebrow: Shared review structure
    title: Review dimensions
    text: Each dimension below is a separate review environment. Open a card to read the full explanation and leave focused
      comments on that exact design dimension.
