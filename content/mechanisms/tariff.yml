  text: ''
challenge_intro:
  eyebrow: Interactive stakeholder challenge
  title: Four perspectives that should not be collapsed into one
  text: Open each card to see targeted questions for the corresponding stakeholder group.
challenges:
- id: challenge-dso
  title: DSO lens
  question: Can the tariff demonstrably reduce the network need at the relevant place and time?
  prompts:
  - What network state triggers the signal?
  - How is avoided reinforcement or congestion quantified?
  - Could rebound create a new peak?
- id: challenge-regulator
  title: Regulatory lens
  question: How far can cost-reflectivity go before affordability and predictability are undermined?
  prompts:
  - Which customers can realistically respond?
  - Should vulnerable or inflexible customers be protected?
  - How frequently may tariff parameters change?
- id: challenge-market
  title: Aggregator and retailer lens
  question: Can the network tariff coexist with wholesale, balancing, and local-market signals?
  prompts:
  - Which signal has operational priority?
  - Can aggregators forecast the tariff exposure?
  - Could tariff response reduce market liquidity?
- id: challenge-customer
  title: Customer and FSP lens
  question: Is the tariff understandable, actionable, and worth responding to?
  prompts:
  - What automation is required?
  - How are benefits and risks communicated?
  - Does the response lower the total bill or merely shift cost?
final_feedback:
  eyebrow: Final contribution
  title: General comments and supporting material
  text: Share regulatory examples, tariff studies, data, figures, or implementation lessons.
